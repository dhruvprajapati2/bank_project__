<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Deposit</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/banking.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0d6efd, #6610f2);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            transition: 0.5s;
            position: relative;
            overflow: hidden;
            padding: 18px 12px;
        }

        body.dark {
            background: #121212;
        }

        /* Floating background animation */
        body::before,
        body::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            width: 150px;
            height: 150px;
            top: -50px;
            left: -50px;
            animation: float1 15s infinite linear;
        }

        body::after {
            width: 200px;
            height: 200px;
            top: 200px;
            left: 70%;
            animation: float2 20s infinite linear;
        }

        @keyframes float1 {
            0% {
                transform: translateY(0) translateX(0);
            }

            50% {
                transform: translateY(100px) translateX(50px);
            }

            100% {
                transform: translateY(0) translateX(0);
            }
        }

        @keyframes float2 {
            0% {
                transform: translateY(0) translateX(0);
            }

            50% {
                transform: translateY(-120px) translateX(-30px);
            }

            100% {
                transform: translateY(0) translateX(0);
            }
        }

        /* Page Title */
        h2 {
            color: white;
            font-size: 28px;
            margin-bottom: 25px;
            animation: fadeIn 0.8s ease-in-out;
        }

        /* Form Card */
        form {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            padding: 40px 35px;
            width: min(100%, 420px);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: slideDown 0.8s ease;
        }

        input[type="number"] {
            width: 100%;
            padding: 12px;
            margin: 15px 0;
            border-radius: 8px;
            border: none;
            outline: none;
            font-size: 18px;
            text-align: center;
        }

        button {
            padding: 12px 30px;
            border-radius: 25px;
            border: none;
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
            background: #ffd54f;
            color: #6610f2;
        }

        /* Message */
        p {
            margin-top: 15px;
            font-weight: 500;
        }

        /* Back Button */
        a {
            text-decoration: none;
            margin-top: 25px;
            background: white;
            color: #6610f2;
            padding: 12px 30px;
            border-radius: 25px;
            font-weight: 600;
            transition: 0.3s;
        }

        a:hover {
            background: #ffd54f;
            transform: scale(1.05);
        }

        /* Dark mode button */
        .toggle-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            cursor: pointer;
            padding: 10px 20px;
            border-radius: 25px;
            background: white;
            color: #333;
            font-weight: 600;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            transition: 0.3s;
        }

        .toggle-btn:hover {
            background: #ffd54f;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        /* Responsive */
        @media(max-width: 500px) {
            form {
                padding: 25px;
            }

            h2 {
                font-size: 1.5rem;
                text-align: center;
            }

            .toggle-btn {
                position: static;
                margin-bottom: 16px;
                width: 100%;
                text-align: center;
            }

            a,
            button {
                width: 100%;
                text-align: center;
            }
        }
    </style>
</head>

<body>

    <h2>Deposit Money</h2>

    <!-- Dark/Light Mode Toggle -->
    <div class="toggle-btn" onclick="toggleMode()">🌙 Mode</div>

    <form th:action="@{/deposit}" method="post">
        Enter Amount:
        <input type="number" name="amount" required>
        <br><br>
        <button>Deposit</button>
    </form>

    <p th:text="${msg}" style="color:green;"></p>

    <a href="/userdashboard">Back</a>

    <script>
        // Dark/Light Mode Toggle
        function toggleMode() {
            document.body.classList.toggle("dark");
        }
    </script>

</body>

</html>
