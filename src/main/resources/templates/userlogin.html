<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Platinum Reserve Bank | User Login</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="/css/banking.css">

    <style>
        body {
            background: linear-gradient(135deg, #eef8ff, #d9f3ff, #ecfffb) !important;
        }

        .login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px 12px;
        }

        .login-box {
            width: min(460px, 96%);
            background: rgba(255, 255, 255, 0.99);
            border: 1px solid #bae6fd;
            border-radius: 18px;
            box-shadow: 0 20px 44px rgba(14, 165, 233, 0.16);
            padding: 24px;
            animation: fadeIn 0.4s ease;
        }

        .brand {
            text-align: center;
            margin-bottom: 14px;
        }

        .brand h1 {
            font-size: 1.6rem;
            color: #0c4a6e;
            margin-bottom: 4px;
        }

        .brand p {
            color: #475569;
            font-size: 0.95rem;
        }

        .title {
            text-align: center;
            margin: 10px 0 16px;
            font-size: 1.35rem;
            color: #0f172a;
        }

        .form-group {
            margin-bottom: 12px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #334155;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .form-group input {
            width: 100%;
        }

        .actions {
            margin-top: 14px;
            display: grid;
            gap: 9px;
        }

        .error {
            margin-top: 10px;
            text-align: center;
            color: #dc2626;
            font-weight: 600;
            min-height: 18px;
        }

        .success {
            margin-top: 10px;
            text-align: center;
            color: #15803d;
            font-weight: 600;
        }

        .register-link {
            margin-top: 14px;
            text-align: center;
            color: #475569;
        }

        .register-link a {
            font-weight: 700;
            color: #0c4a6e;
        }
    </style>
</head>

<body>
    <div class="login-page">
        <div class="login-box">
            <div class="brand">
                <h1><i class="fas fa-building-columns"></i> Platinum Reserve Bank</h1>
                <p>Secure access to your account</p>
            </div>

            <h2 class="title">User Login</h2>

            <form th:action="@{/userlogin}" method="post">
                <div class="form-group">
                    <label for="accountNumber">Account Number</label>
                    <input id="accountNumber" type="text" name="accountNumber" minlength="8" maxlength="20" required>
                </div>

                <div class="form-group">
                    <label for="pin">4 Digit PIN</label>
                    <input id="pin" type="password" name="pin" inputmode="numeric" pattern="[0-9]{4}" maxlength="4" required>
                </div>

                <div class="actions">
                    <button class="btn" type="submit"><i class="fas fa-right-to-bracket"></i> Login</button>
                    <a href="/register" class="btn"><i class="fas fa-user-plus"></i> Open New Account</a>
                </div>
            </form>

            <p class="error" th:if="${error}" th:text="${error}"></p>
            <p class="success" th:if="${success}" th:text="${success}"></p>

            <div class="register-link">
                Don't have an account? <a th:href="@{/register}">Register Here</a>
            </div>
        </div>
    </div>
</body>

</html>
