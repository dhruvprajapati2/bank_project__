<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Accounts</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/admin-panel.css">
</head>

<body class="admin-body">
    <div class="sidebar">
        <h2>Bank Admin Panel</h2>
        <a th:href="@{/admindashboard}">Dashboard</a>
        <a th:href="@{/adminuser}">Users</a>
        <a class="active" th:href="@{/adminaccount}">Accounts</a>
        <a th:href="@{/adminRequest}">Account Requests</a>
        <a th:href="@{/transaction}">Transactions</a>
        <a th:href="@{/atmApplications}">ATM Application Requests</a>
        <a th:href="@{/userReports}">User Reports</a>
        <a th:href="@{/reports}">Reports</a>
        <a class="logout" href="/logout">Logout</a>
    </div>

    <div class="main">
        <div class="top">
            <div>
                <h2>Accounts</h2>
                <small>Manage customer accounts</small>
            </div>
            <a href="/register" class="btn-admin">+ Add New Account</a>
        </div>

        <div class="page-card table-wrap">
            <table class="admin-table">
                <tr>
                    <th>S.No</th>
                    <th>Account No</th>
                    <th>User</th>
                    <th>Balance</th>
                    <th>Action</th>
                </tr>
                <tr th:each="a, stat : ${accounts}">
                    <td th:text="${stat.index + 1}"></td>
                    <td th:text="${a.accountNo}"></td>
                    <td th:text="${a.userName}"></td>
                    <td>&#8377; <span th:text="${#numbers.formatDecimal(a.balance,1,2)}">0.00</span></td>
                    <td>
                        <a th:href="@{/editAccount/{id}(id=${a.id})}" class="btn-admin-ghost">Edit</a>
                        <form th:action="@{/deleteUser}" method="post" style="display:inline;"
                              onsubmit="return confirm('Are you sure you want to delete this account?')">
                            <input type="hidden" name="id" th:value="${a.id}">
                            <button type="submit" class="btn-admin-danger">Delete</button>
                        </form>
                    </td>
                </tr>
            </table>
        </div>
    </div>
</body>

</html>
