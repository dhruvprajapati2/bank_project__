<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Money Transfer</title>
    <link rel="stylesheet" href="/css/banking.css">

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0d6efd, #6610f2);
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .wrapper {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: min(100%, 520px);
            padding: 18px 12px;
        }

        .card,
        .otp-card {
            width: 100%;
            background: white;
            padding: 35px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.25);
            animation: fadeIn 0.6s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h2,
        h3 {
            text-align: center;
            color: #0d6efd;
            margin-bottom: 25px;
        }

        .info-box {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            color: #333;
        }

        label {
            font-weight: 600;
            font-size: 14px;
        }

        input,
        select {
            width: 100%;
            padding: 11px;
            margin: 8px 0 18px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        input:focus,
        select:focus {
            border-color: #0d6efd;
            box-shadow: 0 0 5px rgba(13, 110, 253, 0.4);
            outline: none;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #0d6efd, #0056d2);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            transform: scale(1.02);
        }

        .otp-btn {
            background: #198754;
        }

        .msg-success {
            text-align: center;
            margin-top: 15px;
            color: green;
            font-weight: 600;
        }

        .msg-error {
            text-align: center;
            margin-top: 15px;
            color: red;
            font-weight: 600;
        }

        .back {
            text-align: center;
            margin-top: 18px;
        }

        .back a {
            text-decoration: none;
            color: #0d6efd;
            font-weight: bold;
        }

        @media (max-width: 576px) {
            .wrapper {
                padding: 14px 10px;
                gap: 14px;
            }

            .card,
            .otp-card {
                padding: 20px 16px;
                border-radius: 12px;
            }

            h2,
            h3 {
                font-size: 1.25rem;
                margin-bottom: 18px;
            }
        }
    </style>
</head>

<body>

    <div class="wrapper">

        <!-- ================= TRANSFER FORM ================= -->
        <div class="card" th:if="${showOtp == null or !showOtp}">
            <h2>💸 Transfer Money</h2>

            <div class="info-box">
                <strong>From Account:</strong>
                <span th:text="${session.userAcc}"></span><br>
                <strong>Available Balance:</strong>
                ₹ <span th:text="${balance}"></span>
            </div>

            <form th:action="@{/transfer}" method="post">

                <label>To Account Number</label>
                <input type="number" name="toAccount" required>

                <label>Receiver Name</label>
                <input type="text" id="receiverName" readonly>

                <label>Amount (₹)</label>
                <input type="number" name="amount" min="1" step="0.01" required>

                <label>Transfer Note (Optional)</label>
                <input type="text" name="note">

                <label>Transfer Method</label>
                <select name="transferType" required>
                    <option value="">-- Select Method --</option>
                    <option value="NEFT">NEFT</option>
                    <option value="RTGS">RTGS</option>
                </select>

                <button type="submit">Send OTP</button>
            </form>

            <p class="msg-success" th:if="${msg != null and !#strings.contains(msg,'Invalid')}" th:text="${msg}"></p>

            <p class="msg-error" th:if="${msg != null and #strings.contains(msg,'Invalid')}" th:text="${msg}"></p>

            <div class="back">
                <a th:href="@{/userdashboard}">← Back to Dashboard</a>
            </div>
        </div>

        <!-- ================= OTP FORM ================= -->
        <div class="otp-card" th:if="${showOtp == true}">
            <h3>🔐 Enter OTP</h3>

            <form th:action="@{/verifyOtp}" method="post">
                <input type="text" name="otp" maxlength="6" pattern="[0-9]{6}" inputmode="numeric"
                    placeholder="Enter 6-digit OTP" required>

                <button type="submit" class="otp-btn">
                    Verify & Complete Transfer
                </button>
            </form>

            <p class="msg-error" th:if="${msg != null}" th:text="${msg}"></p>
        </div>

    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const accInput = document.querySelector("input[name='toAccount']");
            if (!accInput) return;

            accInput.addEventListener("blur", function () {
                if (!this.value) return;

                fetch("/getAccountName?accountNo=" + this.value)
                    .then(res => res.text())
                    .then(data => {
                        document.getElementById("receiverName").value =
                            data === "NOT_FOUND" ? "Account Not Found" : data;
                    });
            });
        });
    </script>

</body>

</html>
